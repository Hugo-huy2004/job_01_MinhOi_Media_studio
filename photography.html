<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photography - Mình Ơi Media</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="js/layout.js"></script>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

  <div id="header-placeholder"></div>

  <section class="hero-minimal has-image">
    <img src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778867317/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_00.48.29_sybzuk.png" alt="Photography Background" class="hero-minimal-bg">
    <div class="container">
      <div class="editorial-header reveal">
        <span class="editorial-label">Gallery Portfolio</span>
        <h1 class="brand-minh-oi">Photography</h1>
        <div class="editorial-divider"></div>
        <p class="editorial-lead">
          Nơi lưu giữ những khoảnh khắc chân thực và đầy hạnh phúc qua từng khung hình.
        </p>
      </div>
    </div>
  </section>

  <main class="container section">
    <div class="editorial-grid reveal">
      <!-- 1. Large Feature Card -->
      <a href="album-detail.html?id=1" class="gallery-card card-large">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778867317/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_00.48.29_sybzuk.png"
            alt="Photography Cover" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">Wedding Story</span>
          <h3>Cô Dâu Anh Thi</h3>
        </div>
      </a>

      <!-- 2. Medium Card -->
      <a href="album-detail.html?id=2" class="gallery-card card-medium">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778867585/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_00.53.00_eejfwb.png"
            alt="Couple 1" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">Photography</span>
          <h3>Tuyền & Toàn</h3>
        </div>
      </a>

      <!-- 3. Portrait Card -->
      <a href="album-detail.html?id=3" class="gallery-card card-portrait">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778867815/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_00.56.48_sh7wlu.png"
            alt="Couple 2" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">Nature Romance</span>
          <h3>Huỳnh & Khanh</h3>
        </div>
      </a>

      <!-- 4. Medium Card -->
      <a href="album-detail.html?id=4" class="gallery-card card-medium">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778868272/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_01.04.13_ilpbgv.png"
            alt="Couple 3" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">Wedding Day</span>
          <h3>Nhi & Tú</h3>
        </div>
      </a>

      <!-- 5. Portrait Card -->
      <a href="album-detail.html?id=5" class="gallery-card card-portrait">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778868447/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_01.07.10_ytfgfo.png"
            alt="Couple 4" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">The Moments</span>
          <h3>Phượng & Tú</h3>
        </div>
      </a>
      
      <!-- 6. Medium Card -->
      <a href="album-detail.html?id=6" class="gallery-card card-medium">
        <div class="gallery-image-wrap">
          <img
            src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778868752/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_01.12.23_u1weqz.png"
            alt="Couple 5" class="gallery-image">
        </div>
        <div class="gallery-info-glass">
          <span class="card-category">True Story</span>
          <h3>Huyền & Trâm</h3>
        </div>
      </a>
    </div>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>layout.inject('photography');</script>

</html>
