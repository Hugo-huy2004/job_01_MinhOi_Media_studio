<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Videography - Mình Ơi Media</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="js/layout.js"></script>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

  <div id="header-placeholder"></div>

  <section class="hero-minimal has-image">
    <img src="https://res.cloudinary.com/dyehwoscu/image/upload/v1778870440/A%CC%89nh_ma%CC%80n_hi%CC%80nh_2026-05-16_lu%CC%81c_01.40.32_vc2rlj.png" alt="Videography Background" class="hero-minimal-bg">
    <div class="container">
      <div class="editorial-header reveal">
        <span class="editorial-label">Cinematic Films</span>
        <h1 class="brand-minh-oi">Videography</h1>
        <div class="editorial-divider"></div>
        <p class="editorial-lead">
          Kể câu chuyện tình yêu qua những thước phim điện ảnh đầy cảm xúc và chân thực.
        </p>
      </div>
    </div>
  </section>

  <main class="container section">
    <div class="editorial-grid reveal">
      <!-- 1. Featured Film (Large) -->
      <div class="video-item card-large">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/NCtdOi5efqs?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>

      <!-- 2. Documentary Film (Medium) -->
      <div class="video-item card-medium">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/cjec6tR4FlI?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>

      <!-- 3. Cinematic Film (Medium) -->
      <div class="video-item card-medium">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/IGDjTgUuTHg?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>

      <!-- 4. Story Film (Portrait) -->
      <div class="video-item card-portrait">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/0XnfsayBRYY?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>

      <!-- 5. Wedding Film (Medium) -->
      <div class="video-item card-medium">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/5-R2pXNuXIw?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>

      <!-- 6. Highlights Film (Medium) -->
      <div class="video-item card-medium">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/8jiLNAOrIDY?modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </main>


  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
    layout.inject('videography');
  </script>
</body>
</html>
