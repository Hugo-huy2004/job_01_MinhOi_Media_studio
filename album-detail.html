      if (!albumData[i]) albumData[i] = { name: `Cặp đôi #${i}`, images: albumData["1"].images };
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || "1";
    const currentAlbum = albumData[id];

    if (currentAlbum) {
      document.getElementById('albumTitle').innerText = currentAlbum.name;
      const grid = document.getElementById('albumGrid');

      const quotes = [
        "Vì yêu mà đến, vì thương mà ở lại.",
        "Hạnh phúc là khi được cùng anh già đi.",
        "Tình yêu không phải là nhìn nhau, mà là cùng nhìn về một hướng.",
        "Cảm ơn em đã xuất hiện trong cuộc đời anh.",
        "Yêu là cùng nhau đi hết đoạn đường đời.",
        "Bên nhau bình yên, nắm tay đến già."
      ];

      currentAlbum.images.forEach((imgUrl, index) => {
        grid.innerHTML += `<div class="gallery-card"><img src="${imgUrl}" class="gallery-image"></div>`;

        // Intersperse a quote at a strategic position (e.g., after the 2nd photo)
        if (index === 1) {
          const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
          grid.innerHTML += `
            <div class="gallery-card quote-card">
              <p>"${randomQuote}"</p>
              <div class="quote-author">MÌNH ƠI MEDIA</div>
            </div>
          `;
        }
      });

      // Update layout class based on TOTAL children (images + quotes)
      const totalCount = grid.children.length;
      grid.classList.add(`album-count-${totalCount}`);
